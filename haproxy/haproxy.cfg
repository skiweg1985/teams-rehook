global
  log stdout format raw local0
  maxconn 2048

defaults
  log global
  mode http
  option httplog
  option dontlognull
  timeout connect 5s
  timeout client 60s
  timeout server 60s
  timeout tunnel 1h

frontend fe_http
  bind *:80
  bind *:443 ssl crt /certs/localhost.pem
  http-request set-header X-Forwarded-Proto https if { ssl_fc }
  http-request set-header X-Forwarded-Proto http if !{ ssl_fc }
  http-request set-header X-Forwarded-Host %[req.hdr(Host)]
  __TRUSTED_UPSTREAM_PROXY_ACL__
  http-request set-var(txn.trusted_incoming_xff) req.hdr(X-Forwarded-For) if trusted_upstream_proxy { req.hdr(X-Forwarded-For) -m found }
  http-request del-header X-Forwarded-For
  http-request add-header X-Forwarded-For %[var(txn.trusted_incoming_xff)], %[src] if { var(txn.trusted_incoming_xff) -m found }
  http-request add-header X-Forwarded-For %[src] unless { var(txn.trusted_incoming_xff) -m found }

  acl is_api path_beg /api/
  acl is_api_root path -i /api

  use_backend be_app_backend if is_api or is_api_root
  default_backend be_app_frontend

backend be_app_backend
  option httpchk GET /api/v1/health
  server app-backend backend:8000 check

backend be_app_frontend
  option httpchk GET /
  server app-frontend frontend:80 check
