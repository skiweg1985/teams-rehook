<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teams Rehook</title>
    <link id="app-favicon" rel="icon" type="image/png" href="/brand/favicon-light.png" />
    <script>
      (function () {
        try {
          var p = localStorage.getItem("teams-rehook-theme") || "system";
          var dark = p === "dark" || (p === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
          document.documentElement.dataset.themePreference = p;
          document.documentElement.style.colorScheme = dark ? "dark" : "light";
          document.getElementById("app-favicon").href = dark ? "/brand/favicon-dark.png" : "/brand/favicon-light.png";
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
 </html>
