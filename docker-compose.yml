services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  proxy:
    build:
      context: ./haproxy
    container_name: teams-rehook-proxy
    depends_on:
      - frontend
      - backend
    ports:
      - "${PROXY_HTTP_PORT:-8080}:80"
      - "${PROXY_HTTPS_PORT:-8443}:443"
    volumes:
      - ./devcert:/certs
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: teams-rehook-frontend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: teams-rehook-backend
    env_file:
      - .env
    environment:
      # Override the SQLite default with the bundled Postgres service in containers
      DATABASE_URL: postgresql+psycopg2://app:app@postgres:5432/app
    volumes:
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
