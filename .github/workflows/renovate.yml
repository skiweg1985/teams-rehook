name: Renovate

on:
  schedule:
    # GitHub schedules run on the repository default branch.
    # This job asks Renovate to update the active development branch (dev-1).
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run Renovate
        uses: renovatebot/github-action@dd5302ec17783b2fc721b19ae7209b57b1587765 # v46.1.17
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_PLATFORM: github
          RENOVATE_REPOSITORIES: '["skiweg1985/teams-rehook"]'
          RENOVATE_BASE_BRANCHES: '["dev-1"]'
          RENOVATE_REQUIRE_CONFIG: required
          RENOVATE_ONBOARDING: "false"
