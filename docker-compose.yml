services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  proxy:
    build:
      context: ./haproxy
    container_name: codex-app-proxy
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./devcert:/certs
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: codex-app-frontend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: codex-app-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://app:app@postgres:5432/app
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-http://localhost}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@example.com}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-change-me-admin-password}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-session-secret}
    volumes:
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
