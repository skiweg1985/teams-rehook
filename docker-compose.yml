services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_net
    restart: unless-stopped

  proxy:
    build:
      context: ./haproxy
    container_name: teams-rehook-proxy
    depends_on:
      - frontend
      - backend
    env_file:
      - .env
    environment:
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-}
    ports:
      - "${PROXY_HTTP_PORT:-8080}:80"
      - "${PROXY_HTTPS_PORT:-8443}:443"
    volumes:
      - ./devcert:/certs
    networks:
      - app_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: teams-rehook-frontend
    networks:
      - app_net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: teams-rehook-backend
    env_file:
      - .env
    environment:
      # Use the bundled Postgres service by default; DATABASE_URL can override it.
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-app}}
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      # Trust X-Forwarded-For only from the bundled proxy and configured upstream proxies.
      COMPOSE_APP_SUBNET: ${COMPOSE_APP_SUBNET:-172.30.0.0/24}
      TRUST_X_FORWARDED_FOR: ${TRUST_X_FORWARDED_FOR:-true}
    volumes:
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  app_net:
    ipam:
      config:
        - subnet: ${COMPOSE_APP_SUBNET:-172.30.0.0/24}
